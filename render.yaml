services:
  - type: web
    name: satudata-ops-agent
    env: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: DATABASE_URL
        value: sqlite:///./data/satudata_ops.db
      - key: CHROMA_PATH
        value: ./data/chroma
      - key: OPENAI_API_KEY
        sync: false

